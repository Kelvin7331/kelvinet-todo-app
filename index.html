<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do List (IndexedDB)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Same beautiful CSS */
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --background: linear-gradient(135deg, #e0e7ff, #ede9fe);
      --text-dark: #1f2937;
      --text-light: #6b7280;
      --border-color: #e5e7eb;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 2rem;
      font-family: 'Inter', sans-serif;
      background: var(--background);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .header {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 2rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    .add-task {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.75rem;
    }

    .add-task input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      transition: all 0.3s ease;
    }

    .add-task input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .add-task button {
      background: #7b61ff;
      color: #fff;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-task button:hover {
      background: #6348e5;
      transform: translateY(-2px);
    }

    .tasks {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
    }

    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .tasks-header h2 {
      font-size: 1.2rem;
      color: var(--text-dark);
    }

    .tasks-header span {
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 600;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      margin-bottom: 0.8rem;
      transition: all 0.2s ease;
    }

    .task:hover {
      background: #f9fafb;
      transform: scale(1.01);
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .checkbox.completed {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      color: var(--text-dark);
      transition: color 0.2s ease, text-decoration 0.2s ease;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--danger);
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.1);
      transform: scale(1.2);
    }

    .empty {
      text-align: center;
      color: var(--text-light);
      padding: 2rem 0;
    }

    .empty .icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .offline-banner {
      background: #f59e0b;
      color: white;
      text-align: center;
      padding: 0.5rem;
      font-size: 0.85rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .add-task { flex-direction: column; }
      .add-task button { width: 100%; }
    }
  </style>
</head>

<body>
<div class="container">
  <div id="offlineBanner" class="offline-banner">
    <i class="fas fa-wifi"></i> You are offline. Your tasks are saved locally.
  </div>

  <div class="header">
    <h1>My To-Do List</h1>
    <p>Stay organized and get things done efficiently.</p>
  </div>

  <div class="add-task">
    <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="handleKeyPress(event)" required>
    <button onclick="addTask()">+ Add Task</button>
  </div>

  <div class="tasks">
    <div class="tasks-header">
      <h2>Tasks</h2>
      <span><span id="taskCount">0</span> tasks remaining</span>
    </div>
    <div id="taskList"></div>
    <div id="emptyState" class="empty">
      <div class="icon">📝</div>
      <p>No tasks yet</p>
      <small>Add your first task above to get started!</small>
    </div>
  </div>
</div>

<script>
  // ---------- IndexedDB Setup ----------
  const DB_NAME = 'TodoDB';
  const DB_VERSION = 1;
  const STORE_NAME = 'tasks';
  let db = null;

  // Open (or create) database
  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => {
        db = request.result;
        resolve(db);
      };
      
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          // Create object store with auto-incrementing id
          const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          // Create an index on 'completed' for faster queries (optional)
          store.createIndex('completed', 'completed');
        }
      };
    });
  }

  // Get all tasks from IndexedDB
  async function getAllTasks() {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  // Add a new task
  async function addTaskToDB(task) {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.add(task);
      request.onsuccess = () => resolve(request.result); // returns new id
      request.onerror = () => reject(request.error);
    });
  }

  // Update a task (toggle completed)
  async function updateTaskInDB(task) {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.put(task);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  // Delete a task
  async function deleteTaskFromDB(id) {
    if (!db) await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.delete(id);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
    });
  }

  // ---------- App State ----------
  let tasks = []; // in-memory cache

  // Helper: escape HTML
  function escapeHTML(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Render tasks from memory
  function renderTasks() {
    const taskList = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');

    if (tasks.length === 0) {
      taskList.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }

    emptyState.style.display = 'none';
    taskList.innerHTML = tasks.map(task => `
      <div class="task">
        <div class="checkbox ${task.completed ? 'completed' : ''}" onclick="toggleTask(${task.id})">
          ${task.completed ? '✓' : ''}
        </div>
        <span class="task-text ${task.completed ? 'completed' : ''}">${escapeHTML(task.text)}</span>
        <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete task" aria-label="Delete task"><i class="fas fa-trash-alt"></i></button>
      </div>
    `).join('');
  }

  function updateTaskCount() {
    const remaining = tasks.filter(t => !t.completed).length;
    document.getElementById('taskCount').textContent = remaining;
  }

  // Load all tasks from IndexedDB into memory and render
  async function loadTasks() {
    try {
      tasks = await getAllTasks();
      renderTasks();
      updateTaskCount();
    } catch (err) {
      console.error('Failed to load tasks:', err);
    }
  }

  // Add new task (UI + DB)
  async function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (text === '') return;

    const newTask = {
      text: text,
      completed: false
    };

    try {
      const newId = await addTaskToDB(newTask);
      // Add to memory with returned id
      tasks.push({ id: newId, text: text, completed: false });
      renderTasks();
      updateTaskCount();
      input.value = '';
    } catch (err) {
      console.error('Failed to add task:', err);
      alert('Could not save task. Please try again.');
    }
  }

  // Toggle task completed status
  async function toggleTask(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;

    const updatedTask = { ...task, completed: !task.completed };
    try {
      await updateTaskInDB(updatedTask);
      // Update memory
      task.completed = updatedTask.completed;
      renderTasks();
      updateTaskCount();
    } catch (err) {
      console.error('Failed to update task:', err);
    }
  }

  // Delete task
  async function deleteTask(taskId) {
    try {
      await deleteTaskFromDB(taskId);
      // Remove from memory
      tasks = tasks.filter(t => t.id !== taskId);
      renderTasks();
      updateTaskCount();
    } catch (err) {
      console.error('Failed to delete task:', err);
    }
  }

  // Helper for Enter key
  function handleKeyPress(event) {
    if (event.key === 'Enter') addTask();
  }

  // Offline status banner (optional)
  function updateOfflineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!navigator.onLine) banner.style.display = 'block';
    else banner.style.display = 'none';
  }

  // Initialize app
  window.onload = async () => {
    await openDB();        // ensure DB is open
    await loadTasks();     // load tasks from IndexedDB
    updateOfflineStatus();

    window.addEventListener('online', updateOfflineStatus);
    window.addEventListener('offline', updateOfflineStatus);
  };
</script>
</body>
</html>
